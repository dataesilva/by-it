# Deploys the site to GitHub Pages on every push to main.
# Inert until the repo is pushed to GitHub and Pages is enabled
# (repo Settings → Pages → Source: "GitHub Actions").
# Other hosts (Netlify, Vercel, Cloudflare Pages) can instead build with
# `npm run build` and serve the dist/ folder — no workflow needed.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Serve from /<repo-name>/ on github.io; remove this env var (or set
          # BASE_PATH=/) once the site moves to a custom domain.
          BASE_PATH: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
