body: >
  As time passes, the Middle Ages began. Starting our journey in Late 11th and Mid 12th Century, the Amazigh or Berber dynasties 
  crossed into the Iberian Peninsula, joining a battle of epic proportions. Strong Developments overtook 
  as North Africans, such as the Berbers, converted to Islam to join forces in the Iberian Peninsula against 
  Christian forces.  

  Going into the 1400s, in 1415 the northern Africa city of Ceuta, now in modern day Spain, was captured by the Portuguese, beginning the mark of expansion, 
  starting a time of darkness for my people. 

  Portuguese sailors swiftly kidnapped Berber captives from the Saharan coast in 1441, bringing them back to Portugal. In three years' 
  time, 235 captives of my people (men, women, and children) from present-day Mauritania were forced to emerge in Lagos after being kidnapped 
  in Portuguese raids. What took place on the crossing to Lagos is considered the start of the transatlantic slave trade by the Portuguese and Brazil.   

