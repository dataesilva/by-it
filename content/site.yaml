# Site-wide settings. Everything here is placeholder text — edit freely.
title: "Batoto Yetu Portugal Interactive"
tagline: "An interactive journey through time"
intro: >
  Welcome to the Interactive Map based off Batoto Yetu Portugal's [Digital African
  Memory project](https://dam.batotoyetu.pt/en/digital-african-memory-portugal/). This map is a shorter, summarized version
  that creates an immersive experience for the viewer that depicts the history throughout
  many generations of Portugal. As you scroll, you will be guided by a narrator,
  shown below, and an interactive map above. As you scroll through, this map will
  change to a different location according to where the event happened.
  Look around and enjoy this engaging experience!

